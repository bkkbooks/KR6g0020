body:
  text: 科南本涅槃經序元崇聖院傳天台宗教校經沙門師正述吾佛大聖人最後雙林會上為末世比丘普及大地衆生明心見性而説是經也備明戒檢廣開常宗摩訶止觀依之為扶律顯常喻之以贖命重寶故經云此經若在佛法則在此經若滅佛法則滅佛法命脈存亡繫焉始於沮渠蒙遜請曇無讖及猛法師兩度翻譯共十三品成四十軸行之北方至宋文帝敕嚴觀二師同謝康樂更共治定開為二十五品縮為三十六軸行之江南其間説聽領悟甚衆著述申明亦多如僧傳所載也去聖逾遙神根轉鈍吾祖章安尊者約龍樹宗旨用天台義門製疏科經深符佛意荊溪刪補法道重明自四明慈雲講唱孤山作記之後寥寥絶聞其故何哉蓋由經文浩博疏義淵微加之科未入經卒難尋討師正刻志斯典有年于茲宋之壬申寓古源法師永清輪下為座首遂倣法華光明體例以疏科句分標經上凡疏不牒者起盡難定而與諸友往復徵折方丈主決必歸於是每夜集於猊峯軒下經科疏記輪環讀之預斯集者大慈懷總報慈大成大雲居簡壽星文勝龍華清正園華懷坦天竺法杭始於是秋之八月終於明年之季春無極東堂可度重加讐訂白雲古山僧録道安鋟梓流通願與後人受持讀誦如説而行上不孤於佛祖下不負於己靈壽祝一人功霑九有云時至元歲在壬午聖制日序序品一經卷一疏卷一鈔一之二卷純陀品二此品施常住五果對此土雜衆哀歎品三此品施勝三修對此土聲聞衆經二卷疏二之三卷鈔二之五卷長壽品四此品訖大衆問品隨問而施對此土菩薩衆金剛身品五名字功德品六經三卷疏四卷鈔五之六卷四相品七經四之五卷疏五卷鈔七卷四依品八經六卷疏五卷鈔七卷邪正品九四諦品十四倒品十一經七卷疏六卷鈔八卷如來性起品十二文字品十三烏喻品十四經八卷疏六之七卷鈔八之九卷月喻品十五菩薩品十六經九卷疏七卷鈔九卷大衆所問品十七經十卷疏八卷鈔九之十卷現病品十八聖行品十九經十一之十三卷疏八之九卷鈔十之十一卷梵行品二十此品末指雜華經明天行嬰兒品二十一經十四之十八卷疏十之十一卷鈔十二之十三卷高貴菩薩品二十二經十九之二十四卷疏十一之十三卷鈔十四之十六卷師子吼品二十三經二十五之三十卷疏十三之十五卷鈔十六之十七卷迦葉菩薩品二十四經三十一之三十四卷疏十五之十七卷鈔十八之十九卷憍陳如品二十五經三十五之三十六卷疏十七之十八卷終鈔十九之二十卷陳如品末後分經四品半唐麟德年至遺教品一還源品二經三十七卷鈔二十卷茶毗品三廓潤品四經三十八卷鈔二十卷疏云居士請僧經云涅槃後分更有燒身起塔囑纍三品鈔云今遺教還源則當囑纍品茶毗廓潤則當燒身起塔之文尚未至此南本大般涅槃經三十六卷二十五品章安尊者疏分文為五初從如是訖序品是召請涅槃衆二從純陀訖大衆問合十六品是開演涅槃施三從現病訖德王合五品是示現涅槃行四從師子吼訖品是問答涅槃義五從迦葉訖陳如品是折攝涅槃用
